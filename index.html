<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="리볼 로스트볼 공식 쇼핑몰" />
  <title>리볼 로스트볼 | REBALL LOSTBALL</title>
  <style>
    :root{--fairway:#0f3a2a;--fairway2:#123b2a;--deep:#0a241a;--mint:#eaf7f0;--ivory:#f7f6ef;--line:#dce5dd;--gold:#f2b544;--ink:#111614;--muted:#637068;--paper:#fbfcf8;--shadow:0 18px 46px -34px rgba(10,36,26,.42)}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fbfcf8,#eef4ea);color:var(--ink);font-family:Pretendard,Apple SD Gothic Neo,Malgun Gothic,Arial,sans-serif}a{color:inherit;text-decoration:none}button,input,select{font:inherit}button{cursor:pointer}svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.wrap{width:min(1240px,calc(100% - 40px));margin:0 auto}.header{position:sticky;top:0;z-index:10;background:rgba(251,252,248,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.head{height:72px;display:grid;grid-template-columns:220px 1fr auto;align-items:center}.brand{display:flex;align-items:center;gap:12px;font-weight:950;color:var(--fairway)}.mark{display:grid;place-items:center;width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#dfe8e2 72%);box-shadow:0 10px 18px -12px #0a241a}.nav{display:flex;justify-content:center;gap:38px;font-size:14px;font-weight:850}.nav-item{position:relative}.nav button{border:0;background:transparent;font-weight:850}.menu{position:absolute;top:34px;left:50%;transform:translateX(-50%);display:none;width:230px;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}.menu.open{display:grid}.menu a{height:42px;display:grid;place-items:center;color:var(--muted)}.menu a:hover{background:var(--mint);color:var(--fairway)}.actions{display:flex;gap:10px;align-items:center}.pill,.icon{border:1px solid var(--line);background:#fff;border-radius:999px;min-height:42px;font-weight:900}.pill{padding:0 16px}.icon{width:42px;display:grid;place-items:center}.mobile-menu{display:none}.main{padding:34px 0 72px}.hero{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:var(--shadow)}.track{display:flex;transition:transform .55s ease}.slide{min-width:100%;min-height:430px;padding:58px;display:grid;grid-template-columns:1fr 1fr;align-items:center;background:linear-gradient(105deg,#fff 0%,#f7f6ef 60%,#eaf7f0 100%)}.slide:nth-child(2){background:linear-gradient(105deg,#fff6de,#eef7ec)}.slide:nth-child(3){background:linear-gradient(105deg,#fff,#ecf4ef)}.eyebrow{color:var(--fairway);font-weight:950}.slide h1{margin:14px 0 0;font-size:clamp(34px,4vw,56px);line-height:1.18}.slide p{color:var(--muted);line-height:1.7;font-weight:650}.hero-art{display:grid;place-items:center}.ball{width:min(310px,70%);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 34% 28%,#fff,#f1f3f0 38%,#d8ddd9 72%,#aab5ad);box-shadow:0 28px 28px -24px #0a241a;display:grid;place-items:center;color:#333;font-family:Georgia,serif;font-size:36px}.box{width:220px;height:160px;border-radius:10px;background:linear-gradient(135deg,#f8f6e9,#fff);border:1px solid #e8dcc0;box-shadow:0 30px 30px -24px #0a241a;display:grid;place-items:center;color:var(--fairway);font-weight:950}.cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;border:0;border-radius:8px;padding:0 22px;background:linear-gradient(100deg,#ffd879,#f2b544,#e69516);color:#0a241a;font-weight:950}.dots{position:absolute;left:0;right:0;bottom:20px;display:flex;justify-content:center;gap:9px}.dots button{width:10px;height:10px;border:0;border-radius:99px;background:#cad5ce}.dots button.on{width:26px;background:var(--fairway)}.trust,.grid,.info,.stats{display:grid;gap:16px}.trust{grid-template-columns:repeat(4,1fr);margin-top:26px;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow);overflow:hidden}.trust article{padding:18px 22px;border-right:1px solid var(--line)}.trust article:last-child{border-right:0}.trust b{display:block;color:var(--fairway)}.trust span{display:block;margin-top:5px;color:var(--muted);font-size:13px}.section{margin:46px 0 22px}.section p{margin:0;color:var(--fairway);font-weight:950}.section h2,.page-title h1{margin:8px 0 0;font-size:clamp(28px,3vw,42px);line-height:1.24}.grid{grid-template-columns:repeat(3,1fr)}.card,.panel,.side,.content,.summary,.empty{border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow)}.card{overflow:hidden}.media{height:210px;display:grid;place-items:center;background:linear-gradient(135deg,#fff,var(--mint));border:0;width:100%}.media .ball{width:150px;font-size:24px}.card-body{padding:20px}.tag{display:inline-block;padding:6px 12px;border-radius:99px;background:var(--mint);color:var(--fairway);font-size:12px;font-weight:900}.card h3{min-height:54px;margin:12px 0 0;font-size:20px}.card p{min-height:58px;color:var(--muted);line-height:1.55}.price-row{display:flex;align-items:center;justify-content:space-between}.round{width:42px;height:42px;border:0;border-radius:50%;background:linear-gradient(100deg,var(--fairway2),var(--fairway),var(--deep));color:#fff}.page-title{margin:18px 0 22px}.layout{display:grid;grid-template-columns:1fr 430px;gap:22px}.gallery{min-height:430px;display:grid;place-items:center;padding:24px}.gallery .ball{width:min(360px,74%);font-size:42px}.buy{padding:24px}.buy h1{font-size:34px;line-height:1.2}.muted{color:var(--muted)}.option{display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center;margin:12px 0}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);border-radius:99px;background:var(--mint);padding:8px 14px;font-weight:850}.chip.on{background:linear-gradient(100deg,var(--fairway2),var(--fairway),var(--deep));color:#fff}.selected{margin:18px 0;padding:14px;border:1px solid var(--line);border-top:4px solid var(--fairway);border-radius:10px;display:flex;justify-content:space-between;gap:14px}.row{display:flex;gap:10px;align-items:center}.secondary{min-height:48px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 22px;font-weight:900}.info{grid-template-columns:repeat(3,1fr);margin-top:24px}.info article{padding:24px}.cart{display:grid;grid-template-columns:1fr 360px;gap:22px}.cart-item{display:grid;grid-template-columns:110px 1fr auto;gap:16px;align-items:center;padding:16px;margin-bottom:14px}.qty{display:flex;gap:10px;align-items:center}.qty button{width:30px;height:30px;border:1px solid var(--line);border-radius:50%;background:#fff}.summary{padding:22px;display:grid;gap:14px}.summary div{display:flex;justify-content:space-between}.form{padding:24px;display:grid;gap:14px}.form label{display:grid;gap:7px;font-weight:850}.form input,.form select{height:46px;border:1px solid var(--line);border-radius:8px;padding:0 12px}.complete{max-width:760px;margin:40px auto;text-align:center;padding:48px}.mypage,.admin{display:grid;grid-template-columns:250px 1fr;gap:22px}.side{padding:18px;display:grid;gap:8px}.side button{height:40px;border:0;border-radius:8px;background:transparent;text-align:left;font-weight:850}.side button.on{background:var(--mint);color:var(--fairway)}.content{min-height:560px;padding:24px}.stats{grid-template-columns:repeat(4,1fr)}.stats article{padding:22px}.store{overflow:hidden}.store-banner{padding:56px;border-radius:24px;background:linear-gradient(105deg,#fff6df,#eaf7f0);border:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;align-items:center}.dark{margin-top:26px;padding:38px;border-radius:14px;background:linear-gradient(100deg,var(--fairway2),var(--fairway),var(--deep));color:#fff}.footer{border-top:1px solid var(--line);padding:42px 0 60px;color:var(--muted)}table{width:100%;border-collapse:collapse}th,td{padding:14px;border-bottom:1px solid var(--line);text-align:left}th{background:var(--mint);color:var(--fairway)}@media(max-width:900px){.head{grid-template-columns:1fr auto}.nav{display:none}.mobile-menu{display:grid}.actions .icon{display:none}.slide,.layout,.cart,.mypage,.admin,.store-banner{grid-template-columns:1fr}.trust,.grid,.info,.stats{grid-template-columns:1fr 1fr}.menu.mobile{right:0;left:auto;transform:none}.hero .slide{min-height:520px;padding:30px}.hero-art{display:none}}@media(max-width:560px){.wrap{width:min(390px,calc(100% - 24px))}.trust,.grid,.info,.stats{grid-template-columns:1fr}.brand span{display:none}.slide h1{font-size:30px}.cart-item{grid-template-columns:80px 1fr}.media{height:170px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const money=new Intl.NumberFormat('ko-KR');
    const icon={cart:'<svg viewBox="0 0 24 24"><path d="M6 6h15l-2 8H8L6 3H3"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg>',user:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.8-4 5-6 8-6s6.2 2 8 6"/></svg>',menu:'<svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>'};
    const products=[
      ['titleist','타이틀리스트','titleist-pro-v1-v1x-lostball','타이틀리스트 PRO V1 / PRO V1X 로스트볼','PRO V1 / PRO V1X',12900,'투어 레벨 우레탄 계열의 타구감과 스핀 밸런스를 기준으로 선별합니다.'],
      ['bridgestone','브리지스톤','bridgestone-tour-b-lostball','브리지스톤 TOUR B 로스트볼','TOUR B',10900,'부드러운 타구감과 안정감을 제공하는 TOUR B 중심 구성입니다.'],
      ['taylormade','테일러메이드','taylormade-tp5-lostball','테일러메이드 TP5 로스트볼','TP5',11900,'반응성과 비거리 성향을 함께 확인할 수 있는 구성입니다.'],
      ['saintnine','세인트나인','saintnine-lostball','세인트나인 로스트볼','혼합 라인',8900,'입문부터 실전 라운드까지 부담 없이 고르기 쉬운 라인입니다.'],
      ['volvik','볼빅','volvik-lostball','볼빅 로스트볼','프리미엄 혼합',7900,'컬러볼 시인성과 개성을 중시하는 골퍼에게 맞춘 구성입니다.'],
      ['srixon','스릭슨','srixon-z-star-lostball','스릭슨 Z-STAR 로스트볼','Z-STAR',9900,'접근 스핀과 타구감을 중시하는 Z-STAR 계열 라인입니다.']
    ].map(([brandSlug,brandName,slug,name,line,price,copy])=>({brandSlug,brandName,slug,name,line,price,copy,models:[line,'혼합'],colors:['화이트','혼합']}));
    const banners=[['검증된 품질의 로스트볼','새 볼 같은 경험을\n합리적인 가격으로','전문적인 검수와 동일한 이미지 기준으로 상품을 고릅니다.','대표 상품 보기','/'],['오프라인 매장 이벤트','부천 매장 직운영\n방문 혜택 준비','매장 방문 고객에게 현장 상담과 전용 혜택을 제공합니다.','매장소개 보기','/store'],['믿을 수 있는 품질','프리미엄 선별\nREBALL LOSTBALL','성능과 외관을 기준으로 분류한 로스트볼을 제공합니다.','지금 쇼핑하기','/']];
    let state={banner:0,menu:false,cart:JSON.parse(localStorage.reballCart||'[]'),orders:JSON.parse(localStorage.reballOrders||'[]'),tab:'orders',admin:'dashboard',sel:{}};
    const app=document.querySelector('#app');
    const route=()=>location.hash.replace(/^#/,'')||'/';
    const go=r=>{state.menu=false;location.hash=r;if(route()===r)render()};
    const save=()=>{localStorage.reballCart=JSON.stringify(state.cart);localStorage.reballOrders=JSON.stringify(state.orders)};
    const pslug=s=>products.find(p=>p.slug===s)||products[0];
    const sel=p=>state.sel[p.slug]||{model:p.models[0],grade:'A+',pack:'10구',color:p.colors[0]};
    const price=p=>p.price+(sel(p).grade==='A'?-1200:sel(p).grade==='B'?-2600:0)+(sel(p).pack==='30구'?21000:0);
    const shell=html=>{app.innerHTML=`<header class="header"><div class="wrap head"><a class="brand" href="#/"><span class="mark">R</span><span>리볼 로스트볼</span></a><nav class="nav"><div class="nav-item"><button data-menu>상품소개</button><div class="menu ${state.menu?'open':''}">${menuLinks()}</div></div><a href="#/inspection">검수기준</a><a href="#/story">브랜드 스토리</a><a href="#/store">매장소개</a><a href="#/customer">고객센터</a></nav><div class="actions"><button class="icon mobile-menu" data-menu>${icon.menu}</button><button class="icon" data-menu>⌕</button><a class="pill" href="#/cart">장바구니 <b>${state.cart.length}</b></a><a class="icon" href="#/mypage">${icon.user}</a></div><div class="menu mobile ${state.menu?'open':''}">${menuLinks()}</div></div></header><main class="wrap main">${html}</main><footer class="wrap footer"><b>REBALL LOSTBALL</b><p>리볼 로스트볼 공식 쇼핑몰. Supabase 상품 데이터와 로컬 주문 흐름을 기반으로 동작합니다.</p></footer>`;bind()};
    const menuLinks=()=>`<a href="#/">전체(로스트볼)</a>${products.map(p=>`<a href="#/category/${p.brandSlug}">${p.brandName}</a>`).join('')}<a href="#/category/mix">브랜드 혼합/가성비 라인</a>`;
    function home(){shell(`<section class="hero"><div class="track" style="transform:translateX(-${state.banner*100}%)">${banners.map(b=>`<article class="slide"><div><p class="eyebrow">${b[0]}</p><h1>${b[1].replace('\n','<br>')}</h1><p>${b[2]}</p><button class="cta" data-go="${b[4]}">${b[3]} ›</button></div><div class="hero-art"><div class="box">REBALL<br>LOSTBALL</div><div class="ball">Titleist<br>1</div></div></article>`).join('')}</div><div class="dots">${banners.map((_,i)=>`<button class="${state.banner===i?'on':''}" data-banner="${i}"></button>`).join('')}</div></section>${trust()}<section class="section"><p>대표 상품</p><h2>로스트볼 6종을 같은 기준으로 고르세요</h2></section><section class="grid">${products.map(card).join('')}</section>`)}
    const trust=()=>`<section class="trust"><article><b>15단계 검수</b><span>표준화된 등급 기준</span></article><article><b>등급 선택</b><span>A+ / A / B 구성</span></article><article><b>10구 / 30구</b><span>필요 수량 구성</span></article><article><b>빠른 출고</b><span>15시 출고 준비</span></article></section>`;
    const card=p=>`<article class="card"><button class="media" data-go="/product/${p.slug}"><div class="ball">${p.brandName[0]}</div></button><div class="card-body"><span class="tag">${p.brandName}</span><h3>${p.name}</h3><p>${p.copy}</p><div class="price-row"><b>₩${money.format(p.price)}부터</b><button class="round" data-add="${p.slug}">${icon.cart}</button></div></div></article>`;
    function detail(slug){const p=pslug(slug),s=sel(p);shell(`<div class="page-title"><p class="eyebrow">${p.brandName} / 로스트볼</p><h1>${p.name}</h1></div><section class="layout"><article class="panel gallery"><div class="ball">${p.brandName}<br>${p.line}</div></article><aside class="panel buy"><span class="tag">재고 있음</span><h1>${p.name}</h1><p class="muted">${p.copy}</p><h2>₩${money.format(price(p))}부터</h2>${opt(p,'model','모델',p.models)}${opt(p,'grade','등급',['A+','A','B'])}${opt(p,'pack','구성',['10구','30구'])}${opt(p,'color','색상',p.colors)}<div class="selected"><b>${s.model} / ${s.grade} / ${s.pack} / ${s.color}</b><b>₩${money.format(price(p))}</b></div><div class="row"><button class="cta" data-add="${p.slug}">장바구니 담기</button><button class="secondary" data-buy="${p.slug}">바로 구매</button></div></aside></section>${trust()}<section class="info"><article class="panel"><h3>등급 가이드</h3><p>A+는 최상급, A는 우수급, B는 실속형입니다.</p></article><article class="panel"><h3>상품 상세 정보</h3><p>동일한 크기와 조명 기준으로 상품을 관리합니다.</p></article><article class="panel"><h3>배송 안내</h3><p>주문 확인 후 검수 기준에 맞춰 포장합니다.</p></article></section>`)}
    const opt=(p,k,l,arr)=>`<div class="option"><b>${l}</b><div class="chips">${arr.map(v=>`<button class="chip ${sel(p)[k]===v?'on':''}" data-opt="${p.slug}|${k}|${v}">${v}</button>`).join('')}</div></div>`;
    function add(slug){const p=pslug(slug),s=sel(p),key=[slug,s.model,s.grade,s.pack,s.color].join('|'),e=state.cart.find(i=>i.key===key);if(e)e.qty++;else state.cart.push({key,slug,name:p.name,brand:p.brandName,price:price(p),qty:1,sel:s});save();render()}
    function cart(){const total=state.cart.reduce((a,i)=>a+i.price*i.qty,0);shell(`<div class="page-title"><p class="eyebrow">장바구니</p><h1>선택한 로스트볼 구성</h1></div><section class="cart"><div>${state.cart.length?state.cart.map(i=>`<article class="panel cart-item"><div class="ball">${i.brand[0]}</div><div><b>${i.name}</b><p>${i.sel.model} / ${i.sel.grade} / ${i.sel.pack} / ${i.sel.color}</p><b>₩${money.format(i.price)}</b></div><div class="qty"><button data-qty="${i.key}|-1">-</button><b>${i.qty}</b><button data-qty="${i.key}|1">+</button></div></article>`).join(''):'<article class="empty panel"><h2>장바구니가 비어 있습니다.</h2><button class="cta" data-go="/">상품 보러가기</button></article>'}</div><aside class="summary"><h2>결제 금액</h2><div><span>상품금액</span><b>₩${money.format(total)}</b></div><div><span>배송비</span><b>${total>=30000||!total?'무료':'₩2,500'}</b></div><button class="cta" data-go="/checkout" ${state.cart.length?'':'disabled'}>주문서 작성</button></aside></section>`)}
    function checkout(){const total=state.cart.reduce((a,i)=>a+i.price*i.qty,0);shell(`<div class="page-title"><p class="eyebrow">주문서</p><h1>배송지와 결제 정보를 확인하세요</h1></div><form class="cart" id="order"><section class="panel form"><label>받는 사람<input name="name" value="홍길동" required></label><label>휴대폰<input name="phone" value="010-1234-5678" required></label><label>배송지<input name="address" value="서울특별시 강남구 테헤란로 123" required></label><label>배송 메모<select name="memo"><option>부재 시 문 앞에 놓아주세요.</option></select></label></section><aside class="summary"><h2>주문 요약</h2>${state.cart.map(i=>`<div><span>${i.name} x ${i.qty}</span><b>₩${money.format(i.price*i.qty)}</b></div>`).join('')}<hr><div><span>총 결제금액</span><b>₩${money.format(total)}</b></div><button class="cta">결제 완료 처리</button></aside></form>`)}
    function order(id){const o=state.orders.find(x=>x.id===id);shell(`<section class="panel complete"><h1>구매결정이 완료되었습니다.</h1><p>${o?o.name:'고객'}님의 주문이 접수되었습니다.</p><h2>${id}</h2><div class="row" style="justify-content:center"><button class="cta" data-go="/mypage">주문내역 보기</button><button class="secondary" data-go="/">메인으로 이동</button></div></section>`)}
    function mypage(){const tabs=['orders','coupons','points','recent','profile'];shell(`<section class="mypage"><aside class="side">${tabs.map(t=>`<button class="${state.tab===t?'on':''}" data-tab="${t}">${({orders:'주문목록 / 배송조회',coupons:'쿠폰 / 이용권',points:'적립금',recent:'최근 본 상품',profile:'개인정보관리 / 수정'})[t]}</button>`).join('')}</aside><main class="content">${mycontent()}</main></section>`)}
    function mycontent(){if(state.tab==='coupons')return '<h1>쿠폰 / 이용권</h1><article class="panel" style="padding:28px;max-width:520px"><p>신규 회원가입 축하 쿠폰</p><h2>3,000원 할인</h2><p>발급일로부터 7일 이내</p></article>';if(state.tab==='profile')return '<h1>개인정보관리 / 수정</h1><form class="form"><label>이름<input value="홍길동"></label><label>이메일<input value="honggildong@example.com"></label><button class="cta" type="button">정보 수정</button></form>';return `<h1>주문목록</h1>${state.orders.length?state.orders.map(o=>`<article class="panel" style="padding:20px;margin:12px 0"><b>${o.id}</b><p>${o.name} · ₩${money.format(o.total)}</p></article>`).join(''):'<article class="empty panel">표시할 내역이 없습니다.</article>'}`}
    function store(){shell(`<section class="store"><div class="store-banner"><div><p class="eyebrow">오프라인 매장 이벤트</p><h1>부천 매장 직운영<br>방문 혜택 준비</h1><p class="muted">6월 이벤트 기간 동안 방문 고객에게 현장 전용 혜택을 제공합니다.</p></div><div class="hero-art"><div class="box">STORE EVENT</div></div></div><div class="dark"><h2>매장 방문 전 원하는 브랜드를 먼저 골라보세요.</h2><button class="cta" data-go="/">상품 보러가기</button></div></section>`)}
    function admin(){shell(`<section class="admin"><aside class="side">${['dashboard','products','orders'].map(t=>`<button class="${state.admin===t?'on':''}" data-admin="${t}">${t}</button>`).join('')}</aside><main class="content"><h1>관리자</h1>${state.admin==='products'?`<table><tr><th>브랜드</th><th>상품</th><th>가격</th></tr>${products.map(p=>`<tr><td>${p.brandName}</td><td>${p.name}</td><td>₩${money.format(p.price)}</td></tr>`).join('')}</table>`:`<section class="stats"><article class="panel"><span>상품</span><h2>${products.length}</h2></article><article class="panel"><span>주문</span><h2>${state.orders.length}</h2></article><article class="panel"><span>배너</span><h2>3</h2></article></section>`}</main></section>`)}
    function simple(title,body){shell(`<section class="page-title"><p class="eyebrow">REBALL LOSTBALL</p><h1>${title}</h1><p class="muted">${body}</p></section>${trust()}`)}
    function bind(){document.querySelectorAll('[data-menu]').forEach(n=>n.onclick=()=>{state.menu=!state.menu;render()});document.querySelectorAll('[data-go]').forEach(n=>n.onclick=()=>go(n.dataset.go));document.querySelectorAll('[data-banner]').forEach(n=>n.onclick=()=>{state.banner=+n.dataset.banner;render()});document.querySelectorAll('[data-add]').forEach(n=>n.onclick=()=>add(n.dataset.add));document.querySelectorAll('[data-buy]').forEach(n=>n.onclick=()=>{add(n.dataset.buy);go('/checkout')});document.querySelectorAll('[data-opt]').forEach(n=>n.onclick=()=>{const[a,b,c]=n.dataset.opt.split('|');state.sel[a]={...state.sel[a],[b]:c};detail(a)});document.querySelectorAll('[data-qty]').forEach(n=>n.onclick=()=>{const[k,d]=n.dataset.qty.split('|'),i=state.cart.find(x=>x.key===k);if(i)i.qty=Math.max(1,i.qty+(+d));save();cart()});document.querySelectorAll('[data-tab]').forEach(n=>n.onclick=()=>{state.tab=n.dataset.tab;mypage()});document.querySelectorAll('[data-admin]').forEach(n=>n.onclick=()=>{state.admin=n.dataset.admin;admin()});document.querySelector('#order')?.addEventListener('submit',e=>{e.preventDefault();const f=new FormData(e.currentTarget),total=state.cart.reduce((a,i)=>a+i.price*i.qty,0),id='RB'+Date.now();state.orders.unshift({id,name:f.get('name'),total,items:state.cart});state.cart=[];save();go('/order/'+id)})}
    function category(b){shell(`<div class="page-title"><p class="eyebrow">상품</p><h1>${b==='mix'?'브랜드 혼합/가성비 라인':(products.find(p=>p.brandSlug===b)?.brandName||'전체 상품')}</h1></div><section class="grid">${(b==='mix'?products:products.filter(p=>p.brandSlug===b)).map(card).join('')}</section>`)}
    function render(){const [base,a]=route().split('/').filter(Boolean);if(!base)return home();if(base==='product')return detail(a);if(base==='category')return category(a);if(base==='cart')return cart();if(base==='checkout')return checkout();if(base==='order')return order(a);if(base==='mypage')return mypage();if(base==='store')return store();if(base==='admin')return admin();if(base==='inspection')return simple('검수기준','등급과 이미지 기준을 투명하게 공개합니다.');if(base==='story')return simple('브랜드 스토리','로스트볼을 다시 신뢰할 수 있게 만드는 기준입니다.');if(base==='customer')return simple('고객센터','주문, 배송, 교환 문의를 한 곳에서 처리합니다.');home()}
    addEventListener('hashchange',()=>{state.menu=false;render()});setInterval(()=>{state.banner=(state.banner+1)%3;if(route()==='/')home()},5200);render();
  </script>
</body>
</html>
